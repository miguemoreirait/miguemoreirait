<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .bracket {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 34px;
        fill: #2E5A85;
        letter-spacing: -1px;
      }
      .word {
        font-family: 'Instrument Serif', Georgia, serif;
        font-size: 40px;
        font-weight: 400;
        fill: #14283D;
        letter-spacing: -0.015em;
      }
      .it {
        font-style: italic;
        fill: #2E5A85;
      }
      .sub {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 9px;
        font-weight: 400;
        fill: #3D5670;
        letter-spacing: 0.3em;
      }
    </style>
  </defs>

  <g transform="translate(110 0)">
    <rect x="2" y="2" width="96" height="96" fill="#F2F6FB" stroke="#2E5A85" stroke-width="1.5" rx="6"/>
    <text x="50" y="62" text-anchor="middle" class="bracket">[MM]</text>
  </g>

  <text x="160" y="160" text-anchor="middle" class="word">MigueMoreira<tspan class="it" stroke="#2E5A85" stroke-width="0.9">IT</tspan></text>
  <text x="160" y="185" text-anchor="middle" class="sub">LIC. TECNOLOGÍA DE LA INFORMACIÓN</text>
</svg>
